<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lockd2 Beállítások</title>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #03a9f4;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --border-radius: 8px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #2b2b2b;
                --card-bg: #3c3c3c;
                --text-color: #e0e0e0;
                --primary-color: #29b6f6;
            }
        }

        body {
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2, h3 {
            margin-top: 0;
            border-bottom: 1px solid rgba(128,128,128,0.2);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="password"],
        .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .form-group input[type="checkbox"] {
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            background-color: var(--primary-color);
        }

        button.success { background-color: var(--success-color); }
        button.danger { background-color: var(--danger-color); }

        .hidden { display: none !important; }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .topic-prefix {
            padding: 8px;
            background: rgba(128,128,128,0.2);
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .entity-list-item {
            border: 1px solid rgba(128,128,128,0.2);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
        }
        .entity-list-item.disabled {
            opacity: 0.5;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>MQTT Beállítások</h2>
        <div class="form-group">
            <label>Host</label>
            <input type="text" id="mqttHost" placeholder="pl. 192.168.1.100 vagy core-mosquitto">
        </div>
        <div class="form-group">
            <label>Port</label>
            <input type="number" id="mqttPort" value="1883">
        </div>
        <div class="flex-row">
            <div class="form-group" style="flex:1">
                <label>Felhasználónév</label>
                <input type="text" id="mqttUser">
            </div>
            <div class="form-group" style="flex:1">
                <label>Jelszó</label>
                <input type="password" id="mqttPass">
            </div>
        </div>
        <div class="form-group flex-row">
            <input type="checkbox" id="mqttSSL"> <label for="mqttSSL" style="margin:0">SSL/TLS Használata</label>
        </div>
        <button class="success" onclick="saveConfig()">Beállítások Mentése</button>
        <button onclick="testMQTT()">Tesztelés</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Eszközök (Entitások)</h2>
            <button onclick="showAddModal()">+ Új Hozzáadása</button>
        </div>
        <div id="entityList">
            <!-- Dinamikusan töltődik -->
        </div>
    </div>
</div>

<!-- Modal (Egyszerűsítve div-ként) -->
<div id="editModal" class="card hidden" style="position: fixed; top: 10vh; left: 10%; width: 80%; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <h3 id="modalTitle">Új Entitás</h3>
    <input type="hidden" id="editId">
    
    <div class="form-group">
        <label>Név (Azonosító)</label>
        <input type="text" id="editName" placeholder="pl. Főbejárat">
    </div>

    <div class="form-group">
        <label>HA Entitás</label>
        <select id="editHaEntity" onchange="checkEntityType()">
            <option value="">-- Válassz entitást --</option>
        </select>
    </div>

    <div class="form-group hidden" id="modeContainer">
        <label>Működési mód (Switch esetén)</label>
        <select id="editMode" onchange="checkModeType()">
            <option value="toggle">Toggle (Állapotváltás)</option>
            <option value="pulse">Pulse (Impulzus)</option>
        </select>
    </div>

    <div class="form-group hidden" id="pulseContainer">
        <label>Impulzus hossza (másodperc)</label>
        <input type="number" id="editPulseDuration" value="2">
    </div>

    <div class="form-group flex-row">
        <input type="checkbox" id="hasBattery" onchange="toggleBattery()"> <label for="hasBattery" style="margin:0">Akkumulátor entitás hozzáadása</label>
    </div>

    <div class="form-group hidden" id="batteryContainer">
        <label>Akkumulátor Entitás</label>
        <select id="editBatteryEntity">
            <option value="">-- Válassz entitást --</option>
        </select>
    </div>

    <div class="form-group">
        <label>MQTT Topic Utótag</label>
        <div class="flex-row">
            <span class="topic-prefix">/locks/</span>
            <input type="text" id="editTopicSuffix" placeholder="pl. bejarat" style="flex:1">
        </div>
    </div>

    <div class="flex-row" style="margin-top: 20px;">
        <button class="success" onclick="saveEntity()">Mentés</button>
        <button class="danger" onclick="closeModal()">Mégsem</button>
    </div>
</div>
<div id="modalBackdrop" class="hidden" style="position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 999;"></div>

<script src="app.js"></script>
</body>
</html>
